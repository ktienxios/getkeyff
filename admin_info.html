<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Admin - KTIENXIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050507;
            /* Chỉnh lại màu chủ đạo sang tím để ton-sur-ton với logo của ông */
            --main-color: #9d4edd; 
            --secondary: #00ff88;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.07);
            --text-glow: 0 0 10px rgba(157, 78, 221, 0.5);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        /* Hiệu ứng ánh sáng nền */
        body::before {
            content: ''; position: absolute; width: 450px; height: 450px;
            background: var(--main-color); filter: blur(150px);
            border-radius: 50%; opacity: 0.15; z-index: -1;
        }

        .admin-card {
            width: 85vw; max-width: 400px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 40px;
            padding: 45px 25px; text-align: center;
            backdrop-filter: blur(30px); box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            animation: scaleIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .profile-wrapper { position: relative; display: inline-block; margin-bottom: 25px; }

        .profile-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--main-color); padding: 3px;
            box-shadow: 0 0 25px var(--main-color);
            object-fit: cover;
            background: #000; /* Nền đen nhẹ cho ảnh nổi bật */
        }

        h1 { 
            font-size: 26px; font-weight: 900; margin: 0; 
            color: #fff; text-shadow: var(--text-glow);
            letter-spacing: 1px;
        }
        
        .role { 
            font-size: 11px; color: var(--main-color); 
            font-weight: 900; letter-spacing: 3px; 
            margin-bottom: 30px; text-transform: uppercase;
        }

        .info-list { text-align: left; background: rgba(0,0,0,0.4); border-radius: 25px; padding: 25px; margin-bottom: 35px; border: 1px solid var(--border); }
        
        .info-item { 
            display: flex; align-items: center; gap: 18px; 
            margin-bottom: 18px; font-size: 13px; font-weight: 600;
        }
        
        .info-item:last-child { margin-bottom: 0; }
        .info-item i { color: var(--secondary); width: 22px; font-size: 16px; text-align: center; }
        
        .info-link { color: #fff; text-decoration: none; opacity: 0.8; transition: 0.3s; }
        .info-link:hover { opacity: 1; color: var(--secondary); padding-left: 5px; }

        .back-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #fff;
            padding: 14px 35px; border-radius: 18px; cursor: pointer;
            font-family: 'Montserrat'; font-size: 11px; font-weight: 900;
            transition: 0.4s; text-decoration: none; display: inline-block;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .back-btn:hover { 
            background: var(--main-color); color: #fff; border-color: var(--main-color); 
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="profile-wrapper">
        <img src="https://files.catbox.moe/p95pze.png" alt="Admin KTIENXIOS" class="profile-img">
    </div>
    
    <h1>KTIENXIOS</h1>
    <div class="role">Lead System Developer</div>

    <div class="info-list">
        <div class="info-item">
            <i class="fab fa-telegram-plane"></i>
            <a href="https://t.me/ktienxios" target="_blank" class="info-link">Admin: @ktienxios</a>
        </div>
        <div class="info-item">
            <i class="fas fa-comments"></i>
            <a href="https://t.me/ktienios" target="_blank" class="info-link">Chanel Chat: @ktienios</a>
        </div>
        <div class="info-item">
            <i class="fas fa-sync-alt"></i>
            <a href="https://t.me/aektienxios" target="_blank" class="info-link">Chanel Update: @aektienxios</a>
        </div>
        <div class="info-item">
            <i class="fas fa-code"></i>
            <span style="opacity:0.8">iOS Tweak & Reverse Engineering</span>
        </div>
    </div>

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Quay lại
    </a>
</div>

</body>
</html>
