<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Admin - KTIENXIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050507;
            --main-color: #9d4edd; 
            --secondary: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-glow: 0 0 15px rgba(157, 78, 221, 0.6);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 40px 0; overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Đưa tuyết lên lớp trên cùng (z-index cực cao) */
        #particles-js {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 9999; 
            pointer-events: none; /* Quan trọng: cho phép click xuyên qua lớp tuyết */
        }

        body::before {
            content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; background: var(--main-color);
            filter: blur(180px); border-radius: 50%; opacity: 0.15; z-index: -1;
        }

        ::-webkit-scrollbar { width: 0px; }

        .admin-card {
            width: calc(100% - 40px); 
            max-width: 380px; 
            background: var(--glass);
            border: 1px solid var(--border); border-radius: 40px;
            padding: 40px 20px; text-align: center;
            backdrop-filter: blur(40px); box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: scaleIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            margin-bottom: 40px;
            box-sizing: border-box;
            position: relative; z-index: 1;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Music Player Pro UI */
        .music-player {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
            border: 1px solid var(--border);
            border-radius: 30px; padding: 20px;
            margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px;
            position: relative; overflow: hidden;
        }

        .disc-wrapper {
            position: relative; width: 80px; height: 80px;
        }

        .album-art {
            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 0 2px var(--main-color);
            animation: rotate 5s linear infinite;
            animation-play-state: paused;
            object-fit: cover;
        }

        /* Kim đĩa nhạc */
        .needle {
            position: absolute; top: -5px; right: -10px; width: 30px; height: 40px;
            background: url('https://cdn-icons-png.flaticon.com/512/3659/3659899.png') no-repeat;
            background-size: contain; transition: 0.5s; transform-origin: top right;
            transform: rotate(-20deg); z-index: 10;
        }
        .playing .needle { transform: rotate(0deg); }

        .music-info { text-align: center; }
        .music-title { font-size: 14px; font-weight: 900; color: #fff; margin: 5px 0; letter-spacing: 1px; }
        .music-artist { font-size: 10px; color: var(--main-color); font-weight: 700; text-transform: uppercase; }

        .controls {
            display: flex; align-items: center; gap: 20px;
        }

        .play-btn {
            width: 45px; height: 45px; border-radius: 50%; background: var(--main-color);
            border: none; color: #fff; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4);
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--main-color); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .profile-wrapper { position: relative; display: inline-block; margin-bottom: 20px; }
        .profile-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--main-color); padding: 5px;
            box-shadow: 0 0 30px var(--main-color); object-fit: cover;
            background: #000;
        }

        h1 { font-size: 26px; font-weight: 900; margin: 10px 0 5px 0; text-shadow: var(--text-glow); }
        .role { font-size: 10px; color: var(--main-color); font-weight: 900; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }

        .section-box {
            text-align: left; background: rgba(0,0,0,0.4); border-radius: 25px; 
            padding: 20px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .section-title { font-size: 11px; font-weight: 900; color: var(--secondary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }

        .info-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; font-size: 13px; font-weight: 600; }
        .info-link { color: #fff; text-decoration: none; opacity: 0.8; transition: 0.3s; }
        .info-link:hover { opacity: 1; color: var(--secondary); padding-left: 5px; }

        .bank-details { font-family: monospace; font-size: 14px; color: #eee; }
        .qr-wrapper { margin-top: 15px; background: #fff; padding: 10px; border-radius: 20px; }
        .qr-img { width: 100%; border-radius: 12px; display: block; }
        .slogan { font-size: 11px; font-style: italic; color: #888; margin: 15px 0; }

        .back-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #fff;
            padding: 15px 40px; border-radius: 25px; font-size: 11px; font-weight: 900;
            text-decoration: none; text-transform: uppercase; transition: 0.4s;
        }
        .back-btn:hover { background: var(--main-color); box-shadow: 0 10px 30px rgba(157, 78, 221, 0.4); transform: translateY(-3px); }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    // Cấu hình Tuyết Rơi ở Foreground
    particlesJS('particles-js', {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#ffffff" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.7, "random": true },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": false },
            "move": {
                "enable": true,
                "speed": 1.5,
                "direction": "bottom",
                "random": true,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
            }
        },
        "retina_detect": true
    });

    // Xử lý nhạc & Auto Play
    const audio = document.getElementById('myAudio');
    const playBtn = document.getElementById('playBtn');
    const disc = document.getElementById('disc');
    const playerContainer = document.getElementById('playerContainer');
    let isPlaying = false;

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            disc.style.animationPlayState = 'paused';
            playerContainer.classList.remove('playing');
        } else {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            disc.style.animationPlayState = 'running';
            playerContainer.classList.add('playing');
        }
        isPlaying = !isPlaying;
    }

    playBtn.addEventListener('click', togglePlay);

    // MẸO AUTO PLAY: Phát nhạc ngay khi người dùng chạm vào bất cứ đâu trên web
    document.body.addEventListener('click', function() {
        if(!isPlaying) {
            togglePlay();
        }
    }, { once: true }); // Chỉ chạy 1 lần duy nhất khi click lần đầu
</script>
